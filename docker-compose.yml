# Docker Compose file for LOCAL developement and testing
# All services, databases and Redis run as containers

services:
  # --- Databases ----------------------------
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    environment:
      MYSQL_ROOT_PASSWORD: MYSQL_ROOT_PASSWORD
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_password
    ports:
      - "3306:3306"
    volumes:
      # Persist MySQL data even when the container stops
      - mysql_data:/var/lib/mysql
      # Run SQL setup scripts automatically on first start
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    
    volumes:
      # Persist Redis data even when container stops
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # --- Microservices ---------------

  auth-service:
    # build:
    #   context: ./auth-service
    #   dockerfile: Dockerfile
    image: anuppothen/ecommerce-auth-service:latest
    container_name: ecommerce_auth
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_USER: ecommerce_user
      DB_PASSWORD: ecommerce_password
      DB_NAME: ecommerce_auth
      JWT_SECRET: supersecretkey123changeThis
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    # build:
    #   context: ./product-service
    #   dockerfile: Dockerfile
    image: anuppothen/ecommerce-product-service:latest
    container_name: ecommerce_products
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_USER: ecommerce_user
      DB_PASSWORD: ecommerce_password
      DB_NAME: ecommerce_products
      JWT_SECRET: supersecretkey123changeThis
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  cart-service:
    # build:
    #   context: ./cart-service
    #   dockerfile: Dockerfile
    image: anuppothen/ecommerce-cart-service:latest
    container_name: ecommerce_cart
    environment:
      PORT: 3003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretkey123changeThis
      CART_EXPIRY_SECONDS: 604800
      PRODUCT_SERVICE_URL: http://product-service:3002
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  
  api-gateway:
    # build:
    #   context: ./api-gateway
    #   dockerfile: Dockerfile
    image: anuppothen/ecommerce-api-gateway:latest
    container_name: ecommerce_gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - product-service
      - cart-service
    restart: unless-stopped

# --- Volumes ---------------------------------
# Named volumes persist data between container restarts
volumes:
  mysql_data:
  redis_data: